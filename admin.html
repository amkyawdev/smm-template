<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SMM Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="three-bg"></div>

    <!-- Login -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2><span class="gradient-text">SMM Pro</span></h2>
            <p class="subtitle">Admin Panel</p>
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="bi bi-person"></i> Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="bi bi-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;padding:12px;">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <div id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display:none;">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>SMM Pro</h1>
                    <div class="subtitle-animation">Admin Panel</div>
                </div>
                <nav class="nav-menu">
                    <span style="color:var(--text-secondary);font-size:0.85rem;">
                        <i class="bi bi-person-circle"></i> <span id="adminUsername">Admin</span>
                    </span>
                    <button class="btn-outline" style="padding:4px 16px;font-size:0.8rem;" onclick="handleLogout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </nav>
            </div>
        </header>

        <div class="admin-panel">
            <!-- Settings -->
            <div class="admin-card">
                <h3><i class="bi bi-gear"></i> Site Settings</h3>
                <form id="settingsForm" onsubmit="updateSettings(event)" style="display:grid;gap:12px;">
                    <input type="text" id="siteTitle" class="admin-input" placeholder="Site Title">
                    <input type="text" id="siteSubtitle" class="admin-input" placeholder="Subtitle Text">
                    <input type="url" id="telegramLink" class="admin-input" placeholder="Telegram Link">
                    <button type="submit" class="btn-primary" style="padding:8px 25px;width:fit-content;">
                        <i class="bi bi-save"></i> Save Settings
                    </button>
                </form>
            </div>

            <!-- Pricing -->
            <div class="admin-card">
                <h3><i class="bi bi-tags"></i> Pricing Management</h3>
                <form id="addPricingForm" onsubmit="addPackage(event)" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:15px;">
                    <select id="serviceType" class="admin-input" required>
                        <option value="followers">Followers</option>
                        <option value="views">Views</option>
                        <option value="likes">Likes</option>
                        <option value="comments">Comments</option>
                    </select>
                    <input type="text" id="packageName" class="admin-input" placeholder="Package Name" required>
                    <input type="number" id="quantity" class="admin-input" placeholder="Quantity" required>
                    <input type="number" id="price" class="admin-input" placeholder="Price (Ks)" required>
                    <button type="submit" class="btn-primary" style="padding:8px;">
                        <i class="bi bi-plus-circle"></i> Add
                    </button>
                </form>
                <table class="admin-table">
                    <thead><tr><th>Service</th><th>Package</th><th>Quantity</th><th>Price</th><th>Actions</th></tr></thead>
                    <tbody id="pricingTableBody"></tbody>
                </table>
            </div>

            <!-- Admin Settings -->
            <div class="admin-card">
                <h3><i class="bi bi-shield-lock"></i> Admin Settings</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div>
                        <label style="color:var(--text-secondary);font-size:0.85rem;">Username</label>
                        <div style="display:flex;gap:8px;">
                            <input type="text" id="newUsername" class="admin-input" placeholder="New Username">
                            <button class="btn-primary" style="padding:8px 15px;font-size:0.8rem;" onclick="updateUsername()">
                                <i class="bi bi-pencil"></i> Update
                            </button>
                        </div>
                    </div>
                    <div>
                        <label style="color:var(--text-secondary);font-size:0.85rem;">Change Password</label>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <input type="password" id="currentPassword" class="admin-input" placeholder="Current" style="flex:1;min-width:100px;">
                            <input type="password" id="newPassword" class="admin-input" placeholder="New" style="flex:1;min-width:100px;">
                            <button class="btn-primary" style="padding:8px 15px;font-size:0.8rem;" onclick="changePassword()">
                                <i class="bi bi-key"></i> Change
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module">
        import { initFlameBackground } from './js/three-flames.js';
        initFlameBackground();
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
